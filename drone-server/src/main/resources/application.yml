# 配置数据库连接信息
spring:
  application:
    name: drone-aerial-detection
  datasource:
    url: jdbc:mysql://localhost:3306/drone_aerial_detection_system?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  servlet:
    multipart:
      max-file-size: 10MB # 最大单个文件大小
      max-request-size: 100MB # 最大请求大小（包括所有文件和表单数据）

# 服务器配置
server:
  servlet:
    context-path: /api

# mybatis相关配置
mybatis:
  # mapper 配置文件路径
  mapper-locations: classpath:mapper/*.xml
  # 实体类别名扫描包
  type-aliases-package: com.expressway.entity
  # 其他配置项
  configuration:
    # 开启 SQL 日志打印到控制台
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 开启驼峰命名自动转换, 如：user_name -> userName

# JWT配置
jwt:
  # 管理端配置
  admin-secret-key: drone_aerial_detection_admin_secret_key
  admin-ttl: 7200000 # 2小时（毫秒）
  admin-token-name: token
  # 用户端配置
  user-secret-key: drone_aerial_detection_user_secret_key
  user-ttl: 7200000 # 2小时（毫秒）
  user-token-name: token